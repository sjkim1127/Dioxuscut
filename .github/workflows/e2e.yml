name: E2E

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE:   1

jobs:
  e2e:
    name: E2E CLI Subprocess Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Rust toolchain ──────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # ── 3. System dependencies ─────────────────────────────────────────────
      - name: Install FFmpeg, ffprobe, and Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── 4. Build CLI binary ────────────────────────────────────────────────
      - name: Build dioxuscut CLI binary
        run: cargo build -p dioxuscut-cli --locked

      # ── 5. E2E tests ───────────────────────────────────────────────────────
      - name: Run E2E CLI subprocess tests
        run: |
          cargo test -p dioxuscut-cli --locked --test e2e_cli_subprocess -- \
            --nocapture \
            2>&1 | tee /tmp/e2e_output.log

      # ── 6. Verify positive outputs ────────────────────────────────────────
      - name: Verify rendered MP4 with ffprobe
        run: |
          # Run a quick standalone ffprobe check on a freshly rendered file
          # to double-verify outside the Rust test harness.
          TMPDIR=$(mktemp -d)
          ./target/debug/dioxuscut render \
            --composition HelloWorld \
            --output "$TMPDIR/ci_check.mp4" \
            --width 640 --height 360 \
            --fps 30 --duration 30 \
            --codec h264 --preset ultrafast --crf 28

          ffprobe -v quiet -print_format json -show_streams "$TMPDIR/ci_check.mp4" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          streams = data['streams']
          video = next(s for s in streams if s['codec_type'] == 'video')
          assert video['codec_name'] == 'h264',  f'codec mismatch: {video[\"codec_name\"]}'
          assert video['width']  == 640,         f'width mismatch: {video[\"width\"]}'
          assert video['height'] == 360,         f'height mismatch: {video[\"height\"]}'
          print('ffprobe assertions passed: h264 640x360')
          "
          rm -rf "$TMPDIR"

      # ── 7. Upload artifacts on failure ────────────────────────────────────
      - name: Upload E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs
          path: /tmp/e2e_output.log
          retention-days: 7

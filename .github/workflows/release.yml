name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to retry
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install FFmpeg and Dioxus desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Verify tag matches workspace version
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "dioxuscut-cli") | .version')
          tag_version="${RELEASE_TAG#v}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Tag $RELEASE_TAG does not match workspace version $package_version"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-features

      - name: Verify publish file lists
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            dioxuscut-animation
            dioxuscut-paths
            dioxuscut-rasterizer
            dioxuscut-composition
            dioxuscut-vdom
            dioxuscut-renderer
            dioxuscut-core
            dioxuscut-media
            dioxuscut-player
            dioxuscut-transitions
            dioxuscut-shapes
            dioxuscut-captions
            dioxuscut-noise
            dioxuscut-cli
          )
          for package in "${packages[@]}"; do
            cargo package --locked --list -p "$package" >/dev/null
          done

  publish_crates:
    name: Publish crates.io packages
    needs: validate
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Publish packages in dependency order
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::Repository secret CRATES_IO_TOKEN is not configured"
            exit 1
          fi

          version="${RELEASE_TAG#v}"

          crate_is_published() {
            local package="$1"
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --max-time 15 \
              --user-agent "Dioxuscut-release/${version} (+https://github.com/sjkim1127/Dioxuscut)" \
              "https://crates.io/api/v1/crates/${package}/${version}" \
              >/dev/null 2>&1
          }

          publish_package() {
            local package="$1"

            for attempt in $(seq 1 40); do
              if crate_is_published "$package"; then
                echo "${package}@${version} is already published; skipping"
                return 0
              fi

              echo "Publishing ${package}@${version} (attempt ${attempt}/40)"
              if cargo publish --locked -p "$package"; then
                return 0
              fi
              if [[ "$attempt" -eq 40 ]]; then
                echo "::error::Failed to publish ${package}@${version}"
                return 1
              fi
              sleep 30
            done
          }

          packages=(
            dioxuscut-animation
            dioxuscut-paths
            dioxuscut-rasterizer
            dioxuscut-composition
            dioxuscut-vdom
            dioxuscut-renderer
            dioxuscut-core
            dioxuscut-media
            dioxuscut-player
            dioxuscut-transitions
            dioxuscut-shapes
            dioxuscut-captions
            dioxuscut-noise
            dioxuscut-cli
          )

          for package in "${packages[@]}"; do
            publish_package "$package"
          done

  build_release:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: dioxuscut-cli-linux-x86_64.tar.gz
            binary_name: dioxuscut

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: dioxuscut-cli-macos-aarch64.tar.gz
            binary_name: dioxuscut

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: dioxuscut-cli-macos-x86_64.tar.gz
            binary_name: dioxuscut

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: dioxuscut-cli-windows-x86_64.zip
            binary_name: dioxuscut.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked -p dioxuscut-cli --release --features rhai --target ${{ matrix.target }}

      - name: Package asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -C target/${{ matrix.target }}/release \
            -czf ${{ matrix.asset_name }} \
            ${{ matrix.binary_name }}

      - name: Package asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.binary_name }} `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  github_release:
    name: Create GitHub Release
    needs:
      - publish_crates
      - build_release
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

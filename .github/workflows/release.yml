name: CD (Release Build & Deploy)

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build_release:
    name: Build Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: dioxuscut-cli-linux-x86_64.tar.gz
            binary_name: dioxuscut

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: dioxuscut-cli-macos-aarch64.tar.gz
            binary_name: dioxuscut

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: dioxuscut-cli-macos-x86_64.tar.gz
            binary_name: dioxuscut

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: dioxuscut-cli-windows-x86_64.zip
            binary_name: dioxuscut.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --locked -p dioxuscut-cli --release --target ${{ matrix.target }}

      - name: Package Asset (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.asset_name }} ${{ matrix.binary_name }}

      - name: Package Asset (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          compress-archive -path ${{ matrix.binary_name }} -destinationpath ../../../${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16" />
      <stop offset="50%" stop-color="#12162d" />
      <stop offset="100%" stop-color="#1a0b2e" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#6c63ff" />
    </linearGradient>

    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>

    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff416c" />
      <stop offset="100%" stop-color="#ff4b2b" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="1200" height="400" rx="24" fill="url(#bg-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="2" />

  <!-- Background Decorative Grid Lines -->
  <path d="M 0 100 H 1200 M 0 200 H 1200 M 0 300 H 1200 M 300 0 V 400 M 600 0 V 400 M 900 0 V 400" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- LOGO ICON GROUP (Left Side: Center ~200, 200) -->
  <g transform="translate(180, 200)">
    <!-- Outer Glow Circle Ring -->
    <circle r="110" fill="none" stroke="url(#primary-grad)" stroke-width="3" stroke-dasharray="8 6" opacity="0.4" filter="url(#glow-subtle)" />
    <circle r="95" fill="none" stroke="url(#pink-grad)" stroke-width="2" stroke-dasharray="14 10" opacity="0.6" />

    <!-- Core Film Reel / Hexagon Aperture -->
    <polygon points="0,-80 69.28,-40 69.28,40 0,80 -69.28,40 -69.28,-40" fill="rgba(20, 25, 50, 0.7)" stroke="url(#primary-grad)" stroke-width="4" filter="url(#glow-strong)" />

    <!-- Rust Crab Claw & Clapper Cut Element -->
    <!-- Right Play Triangle with Cutout Lines -->
    <path d="M -30,-45 L 45,0 L -30,45 Z" fill="url(#rust-grad)" filter="url(#glow-strong)" />
    <path d="M -10,-25 L 25,0 L -10,25 Z" fill="#ffffff" opacity="0.9" />

    <!-- Waveform / Frame Track Bars -->
    <rect x="-65" y="-12" width="10" height="24" rx="3" fill="#00f2fe" opacity="0.8" />
    <rect x="-48" y="-20" width="10" height="40" rx="3" fill="#4facfe" opacity="0.9" />
    <rect x="-31" y="-30" width="10" height="60" rx="3" fill="#6c63ff" opacity="0.7" />

    <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glow-strong)" />
  </g>

  <!-- LOGO TEXT GROUP (Right Side: Center ~620, 200) -->
  <g transform="translate(360, 0)">
    <!-- Main Title "DIOXUSCUT" -->
    <text x="0" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="92" letter-spacing="-0.03em" fill="url(#primary-grad)" filter="url(#glow-strong)">
      DIOXUSCUT
    </text>

    <!-- Rust Crab Emoji Badge -->
    <g transform="translate(565, 135)">
      <rect x="0" y="0" width="64" height="34" rx="8" fill="url(#rust-grad)" />
      <text x="32" y="24" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">🦀</text>
    </g>

    <!-- Tagline Subtitle -->
    <text x="5" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="26" letter-spacing="0.08em" fill="rgba(255, 255, 255, 0.85)">
      DECLARATIVE PROGRAMMATIC VIDEO IN RUST
    </text>

    <!-- Secondary Badge Row -->
    <g transform="translate(5, 285)">
      <!-- Badge 1: Remotion Port -->
      <rect x="0" y="0" width="170" height="28" rx="6" fill="rgba(108, 99, 255, 0.2)" stroke="#6c63ff" stroke-width="1" />
      <text x="85" y="19" font-family="monospace" font-size="13" font-weight="bold" fill="#00f2fe" text-anchor="middle">Remotion 4.0 Port</text>

      <!-- Badge 2: Dioxus 0.6 -->
      <rect x="180" y="0" width="130" height="28" rx="6" fill="rgba(79, 172, 254, 0.2)" stroke="#4facfe" stroke-width="1" />
      <text x="245" y="19" font-family="monospace" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Dioxus 0.6 Ready</text>

      <!-- Badge 3: Headless CLI -->
      <rect x="320" y="0" width="160" height="28" rx="6" fill="rgba(255, 0, 127, 0.2)" stroke="#ff007f" stroke-width="1" />
      <text x="400" y="19" font-family="monospace" font-size="13" font-weight="bold" fill="#ff75c3" text-anchor="middle">AI Agent Headless</text>
    </g>
  </g>
</svg>
